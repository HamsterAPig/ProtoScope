app:
  language: zh-CN
  fps_limit: 60
  idle_render: dirty_only
  auto_save:
    enabled: false
    interval_ms: 5000
  config_hot_reload:
    enabled: false

gui:
  window:
    title: ProtoScope
    width: 1600
    height: 900
    maximized: false
  wave:
    max_render_points_per_channel: 1200
    max_render_vertices: 60000
    overview_max_samples: 20000
    min_visible_time_span: 0.001

protocol:
  root_dir: protocols
  selected_dir: protocols/default_protocol

logging:
  level: info

communication:
  kind: tcp_client
  tcp_client:
    host: 127.0.0.1
    port: 9000
  tcp_server:
    bind_address: 0.0.0.0
    port: 9000
    reject_new_connection: true
  serial:
    port_name: COM1
    baud_rate: 115200
    data_bits: 8
    parity: none
    stop_bits: one
    flow_control: none
