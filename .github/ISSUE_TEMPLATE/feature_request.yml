name: Feature Request
description: 提出 ProtoScope 的新能力或改进建议
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        请优先描述真实使用场景和想解决的问题，而不是只给出实现方式。

  - type: textarea
    id: scenario
    attributes:
      label: 使用场景
      description: 你在什么工作流里需要这个能力？
      placeholder: 例如：调试半双工设备时，希望根据 Lua 协议状态自动展示请求/响应阶段。
    validations:
      required: true

  - type: textarea
    id: capability
    attributes:
      label: 期望能力
      description: 描述希望 ProtoScope 增加或改变什么行为。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你现在如何绕过这个问题？有没有可以接受的简化版本？

  - type: textarea
    id: scope
    attributes:
      label: 范围边界
      description: 明确哪些内容需要做，哪些内容不需要做。
      placeholder: |
        需要：
        - ...

        不需要：
        - ...

  - type: checkboxes
    id: impact
    attributes:
      label: 可能影响的区域
      options:
        - label: Lua 协议脚本 API 或 LuaLS 提示
        - label: 协议解析或原始数据回放
        - label: 波形 / Dock / UI 交互
        - label: 串口 / TCP / UDP 通讯
        - label: CMake / 构建 / 发布
        - label: 文档或示例协议

  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      description: 什么结果可以证明这个功能已经满足需求？
