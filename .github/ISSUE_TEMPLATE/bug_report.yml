name: Bug Report
description: 报告 ProtoScope 的可复现缺陷
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请尽量提供可复现信息，尤其是协议脚本、配置文件、输入数据和日志。

  - type: textarea
    id: summary
    attributes:
      label: 问题现象
      description: 简要描述你看到了什么异常行为。
      placeholder: 例如：加载某个 Lua 协议后，接收区有数据但波形 Dock 不刷新。
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 写出从启动程序到触发问题的具体步骤。
      placeholder: |
        1. 启动 ProtoScope
        2. 选择协议 ...
        3. 连接 ...
        4. 点击/发送/导入 ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 描述你认为正确的行为应该是什么。
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际结果
      description: 如果有报错、日志、截图、录屏或崩溃信息，请贴在这里。
      render: text

  - type: textarea
    id: environment
    attributes:
      label: 运行环境
      description: 请填写系统、构建来源、版本或 commit。
      placeholder: |
        - 系统：Windows 11 23H2
        - 构建来源：本地构建 / GitHub Release
        - 版本或 commit：v0.1.0 / 92b0219
        - 连接方式：TCP Client / TCP Server / Serial
    validations:
      required: true

  - type: textarea
    id: protocol
    attributes:
      label: 协议脚本与配置
      description: 如果问题和 Lua 协议、配置、原始数据导入导出有关，请提供最小脚本/配置/样本数据。
      render: lua

  - type: textarea
    id: extra
    attributes:
      label: 其他上下文
      description: 例如是否稳定复现、是否只在某个设备或某个数据包上出现。
