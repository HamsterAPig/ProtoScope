name: Merge CI

"on":
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: merge-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Windows x64 Release
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Configure
        shell: pwsh
        run: >
          cmake -S . -B build -G "Ninja"
          -DCMAKE_BUILD_TYPE=Release
          -DPROTOSCOPE_ENABLE_GUI=ON

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release

      - name: Test
        shell: pwsh
        run: ctest --test-dir build --output-on-failure --build-config Release
