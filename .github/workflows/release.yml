name: Release CI

"on":
  push:
    tags:
      - "v*.*.*"
      - "!v*.*.*-*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-ci-${{ github.event_name }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release-windows:
    name: Windows x64 Release
    runs-on: windows-2022
    timeout-minutes: 60

    env:
      EXE_PATH: build/src/ProtoScope.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Resolve release metadata
        id: release_meta
        shell: pwsh
        run: |
          if ($env:GITHUB_EVENT_NAME -eq "workflow_dispatch") {
            if ($env:GITHUB_REF_TYPE -ne "branch" -or $env:GITHUB_REF_NAME -ne "develop") {
              throw "Manual release must run from develop, got '$env:GITHUB_REF_NAME'."
            }

            $headTags = @(
              git tag --points-at HEAD --list "v*.*.*" |
                Where-Object { $_ -match '^v\d+\.\d+\.\d+$' } |
                Sort-Object { [version]($_ -replace '^v', '') } -Descending
            )

            if ($headTags.Count -gt 0) {
              $releaseTag = $headTags[0]
            } else {
              $previousTags = @(
                git tag --merged HEAD --list "v*.*.*" |
                  Where-Object { $_ -match '^v\d+\.\d+\.\d+$' } |
                  ForEach-Object {
                    [pscustomobject]@{
                      Name = $_
                      Distance = [int](& git rev-list "$_..HEAD" --count)
                      Version = [version]($_ -replace '^v', '')
                    }
                  } |
                  Sort-Object -Property `
                    @{ Expression = { $_.Distance }; Ascending = $true },
                    @{ Expression = { $_.Version }; Descending = $true }
              )

              if ($previousTags.Count -eq 0) {
                throw "No previous vX.Y.Z tag was found for manual develop release."
              }

              $shortSha = git rev-parse --short=7 HEAD
              $releaseTag = "$($previousTags[0].Name)-$shortSha"
            }
          } else {
            $releaseTag = $env:GITHUB_REF_NAME
            if ($releaseTag -notmatch '^v\d+\.\d+\.\d+$') {
              throw "Release tag must match vX.Y.Z, got '$releaseTag'."
            }
          }

          $packageTag = $releaseTag
          $assetBase = "ProtoScope-windows-x64-$packageTag"

          "release_tag=$releaseTag" >> $env:GITHUB_OUTPUT
          "package_tag=$packageTag" >> $env:GITHUB_OUTPUT
          "asset_base=$assetBase" >> $env:GITHUB_OUTPUT

          "RELEASE_TAG=$releaseTag" >> $env:GITHUB_ENV
          "PACKAGE_TAG=$packageTag" >> $env:GITHUB_ENV
          "ASSET_BASE=$assetBase" >> $env:GITHUB_ENV

          "Release tag: $releaseTag"
          "Package tag: $packageTag"
          "Asset base: $assetBase"

      - name: Check source hygiene
        shell: pwsh
        run: |
          $previousTags = @(
            git tag --merged HEAD --list "v*.*.*" |
              Where-Object { $_ -match '^v\d+\.\d+\.\d+$' -and $_ -ne $env:RELEASE_TAG } |
              ForEach-Object {
                [pscustomobject]@{
                  Name = $_
                  Version = [version]($_ -replace '^v', '')
                }
              } |
              Sort-Object -Property @{ Expression = { $_.Version }; Descending = $true }
          )

          if ($previousTags.Count -gt 0) {
            $range = "$($previousTags[0].Name)..HEAD"
          } else {
            $emptyTree = "4b825dc642cb6eb9a060e54bf8d69288fbee4904"
            $range = "$emptyTree..HEAD"
          }

          "Checking whitespace in range: $range"
          git diff --check $range
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Verify generated Lua API
        shell: pwsh
        run: python tools/generate_luals_api.py --check

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build -G "Ninja" `
            -DCMAKE_BUILD_TYPE=Release `
            -DPROTOSCOPE_ENABLE_GUI=ON `
            -DCMAKE_C_COMPILER=cl `
            -DCMAKE_CXX_COMPILER=cl

      - name: Verify MSVC toolchain
        shell: pwsh
        run: |
          $cache = Get-Content build/CMakeCache.txt
          $cache | Select-String "^CMAKE_C_COMPILER:|^CMAKE_CXX_COMPILER:|^CMAKE_MAKE_PROGRAM:"

          $cCompilerMatch = $cache | Select-String "^CMAKE_C_COMPILER:(?:FILEPATH|UNINITIALIZED|STRING)=(.+)$" | Select-Object -First 1
          $cxxCompilerMatch = $cache | Select-String "^CMAKE_CXX_COMPILER:(?:FILEPATH|UNINITIALIZED|STRING)=(.+)$" | Select-Object -First 1

          if (-not $cCompilerMatch) {
            throw "CMAKE_C_COMPILER was not found in CMakeCache.txt."
          }

          if (-not $cxxCompilerMatch) {
            throw "CMAKE_CXX_COMPILER was not found in CMakeCache.txt."
          }

          $cCompiler = $cCompilerMatch.Matches[0].Groups[1].Value
          $cxxCompiler = $cxxCompilerMatch.Matches[0].Groups[1].Value

          if ((Split-Path $cCompiler -Leaf) -notin @("cl", "cl.exe")) {
            throw "Expected MSVC cl.exe for C compiler, got '$cCompiler'."
          }

          if ((Split-Path $cxxCompiler -Leaf) -notin @("cl", "cl.exe")) {
            throw "Expected MSVC cl.exe for CXX compiler, got '$cxxCompiler'."
          }

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release

      - name: Verify runtime dependencies
        shell: pwsh
        run: |
          if (-not (Test-Path $env:EXE_PATH)) {
            throw "Expected executable was not found: $env:EXE_PATH"
          }

          $dependents = & dumpbin.exe /DEPENDENTS $env:EXE_PATH
          $dependents

          $forbiddenRuntimeDlls = @(
            "libwinpthread-1.dll",
            "libgcc_s_seh-1.dll",
            "libstdc++-6.dll",
            "msys-2.0.dll"
          )

          foreach ($dll in $forbiddenRuntimeDlls) {
            if ($dependents -match [regex]::Escape($dll)) {
              throw "Forbidden MinGW/MSYS runtime dependency detected: $dll"
            }
          }

      - name: Test
        shell: pwsh
        run: ctest --test-dir build --output-on-failure --build-config Release

      - name: Prepare assets
        shell: pwsh
        run: |
          $assetDir = "release-assets"
          New-Item -ItemType Directory -Force -Path $assetDir | Out-Null

          if (-not (Test-Path $env:EXE_PATH)) {
            throw "Expected executable was not found: $env:EXE_PATH"
          }

          $exeAssetName = "$env:ASSET_BASE.exe"
          $zipAssetName = "$env:ASSET_BASE.zip"
          $exeAsset = Join-Path $assetDir $exeAssetName
          $zipAsset = Join-Path $assetDir $zipAssetName
          Copy-Item -Path $env:EXE_PATH -Destination $exeAsset -Force
          Compress-Archive -Path $exeAsset -DestinationPath $zipAsset -Force

          Get-FileHash -Algorithm SHA256 $exeAsset |
            ForEach-Object { "$($_.Hash.ToLowerInvariant())  $(Split-Path $_.Path -Leaf)" } |
            Set-Content -Path (Join-Path $assetDir "$exeAssetName.sha256") -Encoding ASCII

          Get-FileHash -Algorithm SHA256 $zipAsset |
            ForEach-Object { "$($_.Hash.ToLowerInvariant())  $(Split-Path $_.Path -Leaf)" } |
            Set-Content -Path (Join-Path $assetDir "$zipAssetName.sha256") -Encoding ASCII

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: protoscope-windows-x64-${{ steps.release_meta.outputs.package_tag }}
          path: release-assets/*
          if-no-files-found: error

      - name: Create draft GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $notes = @"
          ProtoScope $env:RELEASE_TAG

          Assets:
          - $env:ASSET_BASE.exe
          - $env:ASSET_BASE.zip
          - SHA256 checksums
          "@

          gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:RELEASE_TAG release-assets/* `
              --repo $env:GITHUB_REPOSITORY `
              --clobber
          } else {
            gh release create $env:RELEASE_TAG release-assets/* `
              --repo $env:GITHUB_REPOSITORY `
              --title "ProtoScope $env:RELEASE_TAG" `
              --notes $notes `
              --target $env:GITHUB_SHA `
              --draft
          }
