name: Release CI

"on":
  push:
    tags:
      - "v*.*.*"
      - "!v*.*.*-*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-ci-${{ github.event_name }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release-windows:
    name: Windows x64 Release
    runs-on: windows-2022
    timeout-minutes: 60

    env:
      EXE_PATH: build/src/ProtoScope.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Resolve release metadata
        id: release_meta
        shell: pwsh
        run: |
          if ($env:GITHUB_EVENT_NAME -eq "workflow_dispatch") {
            if ($env:GITHUB_REF_TYPE -ne "branch" -or $env:GITHUB_REF_NAME -ne "develop") {
              throw "Manual release must run from develop, got '$env:GITHUB_REF_NAME'."
            }

            $headTags = @(
              git tag --points-at HEAD --list "v*.*.*" |
                Where-Object { $_ -match '^v\d+\.\d+\.\d+$' } |
                Sort-Object { [version]($_ -replace '^v', '') } -Descending
            )

            if ($headTags.Count -gt 0) {
              $releaseTag = $headTags[0]
            } else {
              $previousTags = @(
                git tag --merged HEAD --list "v*.*.*" |
                  Where-Object { $_ -match '^v\d+\.\d+\.\d+$' } |
                  ForEach-Object {
                    [pscustomobject]@{
                      Name = $_
                      Distance = [int](& git rev-list "$_..HEAD" --count)
                      Version = [version]($_ -replace '^v', '')
                    }
                  } |
                  Sort-Object -Property `
                    @{ Expression = { $_.Distance }; Ascending = $true },
                    @{ Expression = { $_.Version }; Descending = $true }
              )

              if ($previousTags.Count -eq 0) {
                throw "No previous vX.Y.Z tag was found for manual develop release."
              }

              $shortSha = git rev-parse --short=7 HEAD
              $releaseTag = "$($previousTags[0].Name)-$shortSha"
            }
          } else {
            $releaseTag = $env:GITHUB_REF_NAME
            if ($releaseTag -notmatch '^v\d+\.\d+\.\d+$') {
              throw "Release tag must match vX.Y.Z, got '$releaseTag'."
            }
          }

          $packageTag = $releaseTag
          $assetBase = "ProtoScope-windows-x64-$packageTag"

          "release_tag=$releaseTag" >> $env:GITHUB_OUTPUT
          "package_tag=$packageTag" >> $env:GITHUB_OUTPUT
          "asset_base=$assetBase" >> $env:GITHUB_OUTPUT

          "RELEASE_TAG=$releaseTag" >> $env:GITHUB_ENV
          "PACKAGE_TAG=$packageTag" >> $env:GITHUB_ENV
          "ASSET_BASE=$assetBase" >> $env:GITHUB_ENV

          "Release tag: $releaseTag"
          "Package tag: $packageTag"
          "Asset base: $assetBase"

      - name: Check source hygiene
        shell: pwsh
        run: |
          $previousTags = @(
            git tag --merged HEAD --list "v*.*.*" |
              Where-Object { $_ -match '^v\d+\.\d+\.\d+$' -and $_ -ne $env:RELEASE_TAG } |
              ForEach-Object {
                [pscustomobject]@{
                  Name = $_
                  Version = [version]($_ -replace '^v', '')
                }
              } |
              Sort-Object -Property @{ Expression = { $_.Version }; Descending = $true }
          )

          if ($previousTags.Count -gt 0) {
            $range = "$($previousTags[0].Name)..HEAD"
          } else {
            $emptyTree = "4b825dc642cb6eb9a060e54bf8d69288fbee4904"
            $range = "$emptyTree..HEAD"
          }

          "Checking whitespace in range: $range"
          git diff --check $range
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Verify generated Lua API
        shell: pwsh
        run: python tools/generate_luals_api.py --check

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build -G "Ninja" `
            -DCMAKE_BUILD_TYPE=Release `
            -DPROTOSCOPE_ENABLE_GUI=ON `
            -DCMAKE_C_COMPILER=cl `
            -DCMAKE_CXX_COMPILER=cl

      - name: Verify MSVC toolchain
        shell: pwsh
        run: |
          $cache = Get-Content build/CMakeCache.txt
          $cache | Select-String "^CMAKE_C_COMPILER:|^CMAKE_CXX_COMPILER:|^CMAKE_MAKE_PROGRAM:"

          $cCompilerMatch = $cache | Select-String "^CMAKE_C_COMPILER:(?:FILEPATH|UNINITIALIZED|STRING)=(.+)$" | Select-Object -First 1
          $cxxCompilerMatch = $cache | Select-String "^CMAKE_CXX_COMPILER:(?:FILEPATH|UNINITIALIZED|STRING)=(.+)$" | Select-Object -First 1

          if (-not $cCompilerMatch) {
            throw "CMAKE_C_COMPILER was not found in CMakeCache.txt."
          }

          if (-not $cxxCompilerMatch) {
            throw "CMAKE_CXX_COMPILER was not found in CMakeCache.txt."
          }

          $cCompiler = $cCompilerMatch.Matches[0].Groups[1].Value
          $cxxCompiler = $cxxCompilerMatch.Matches[0].Groups[1].Value

          if ((Split-Path $cCompiler -Leaf) -notin @("cl", "cl.exe")) {
            throw "Expected MSVC cl.exe for C compiler, got '$cCompiler'."
          }

          if ((Split-Path $cxxCompiler -Leaf) -notin @("cl", "cl.exe")) {
            throw "Expected MSVC cl.exe for CXX compiler, got '$cxxCompiler'."
          }

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release

      - name: Verify runtime dependencies
        shell: pwsh
        run: |
          if (-not (Test-Path $env:EXE_PATH)) {
            throw "Expected executable was not found: $env:EXE_PATH"
          }

          $dependents = & dumpbin.exe /DEPENDENTS $env:EXE_PATH
          $dependents

          $forbiddenRuntimeDlls = @(
            "libwinpthread-1.dll",
            "libgcc_s_seh-1.dll",
            "libstdc++-6.dll",
            "msys-2.0.dll"
          )

          foreach ($dll in $forbiddenRuntimeDlls) {
            if ($dependents -match [regex]::Escape($dll)) {
              throw "Forbidden MinGW/MSYS runtime dependency detected: $dll"
            }
          }

      - name: Test
        shell: pwsh
        run: ctest --test-dir build --output-on-failure --build-config Release

      - name: Prepare assets
        shell: pwsh
        run: |
          $assetDir = "release-assets"
          $stagingDir = "release-package"
          $zipCheckDir = "release-check"
          New-Item -ItemType Directory -Force -Path $assetDir | Out-Null
          New-Item -ItemType Directory -Force -Path $stagingDir | Out-Null
          New-Item -ItemType Directory -Force -Path $zipCheckDir | Out-Null

          if (-not (Test-Path $env:EXE_PATH)) {
            throw "Expected executable was not found: $env:EXE_PATH"
          }

          $exeAssetName = "$env:ASSET_BASE.exe"
          $zipAssetName = "$env:ASSET_BASE.zip"
          $exeAsset = Join-Path $assetDir $exeAssetName
          $zipAsset = Join-Path $assetDir $zipAssetName
          $packageDir = Join-Path $stagingDir $env:ASSET_BASE
          $packageConfigDir = Join-Path $packageDir "config"
          $packageDocsDir = Join-Path $packageDir "docs"
          $packageProtocolsDir = Join-Path $packageDir "protocols"

          New-Item -ItemType Directory -Force -Path $packageConfigDir | Out-Null
          New-Item -ItemType Directory -Force -Path $packageDocsDir | Out-Null
          New-Item -ItemType Directory -Force -Path $packageProtocolsDir | Out-Null

          Copy-Item -Path $env:EXE_PATH -Destination $exeAsset -Force
          Copy-Item -Path $env:EXE_PATH -Destination (Join-Path $packageDir "ProtoScope.exe") -Force
          Copy-Item -Path README.md -Destination (Join-Path $packageDir "README.md") -Force
          Copy-Item -Path LICENSE -Destination (Join-Path $packageDir "LICENSE") -Force
          Copy-Item -Path config/protoscope.yaml -Destination (Join-Path $packageConfigDir "protoscope.yaml") -Force
          Copy-Item -Path docs/* -Destination $packageDocsDir -Recurse -Force
          Copy-Item -Path protocols/* -Destination $packageProtocolsDir -Recurse -Force

          $requiredPackageFiles = @(
            "ProtoScope.exe",
            "README.md",
            "LICENSE",
            "config/protoscope.yaml",
            "docs/user-manual.md",
            "docs/config-reference.md",
            "docs/lua-host-integration.md",
            "docs/module-design.md",
            "docs/release-checklist.md",
            "protocols/README.md",
            "protocols/protoscope_api.lua",
            "protocols/stream_types.lua",
            "protocols/default_protocol/main.lua",
            "protocols/lua_waveform_demo/main.lua",
            "protocols/templates/README.md",
            "protocols/templates/oscilloscope_control/main.lua"
          )
          foreach ($relativePath in $requiredPackageFiles) {
            $fullPath = Join-Path $packageDir $relativePath
            if (-not (Test-Path $fullPath)) {
              throw "Release package is missing required file: $relativePath"
            }
          }

          Compress-Archive -Path $packageDir -DestinationPath $zipAsset -Force
          Expand-Archive -Path $zipAsset -DestinationPath $zipCheckDir -Force
          foreach ($relativePath in $requiredPackageFiles) {
            $fullPath = Join-Path $zipCheckDir "$env:ASSET_BASE/$relativePath"
            if (-not (Test-Path $fullPath)) {
              throw "Release zip is missing required file: $relativePath"
            }
          }

          Get-FileHash -Algorithm SHA256 $exeAsset |
            ForEach-Object { "$($_.Hash.ToLowerInvariant())  $(Split-Path $_.Path -Leaf)" } |
            Set-Content -Path (Join-Path $assetDir "$exeAssetName.sha256") -Encoding ASCII

          Get-FileHash -Algorithm SHA256 $zipAsset |
            ForEach-Object { "$($_.Hash.ToLowerInvariant())  $(Split-Path $_.Path -Leaf)" } |
            Set-Content -Path (Join-Path $assetDir "$zipAssetName.sha256") -Encoding ASCII

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: protoscope-windows-x64-${{ steps.release_meta.outputs.package_tag }}
          path: release-assets/*
          if-no-files-found: error

      - name: Create draft GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $previousTags = @(
            git tag --merged HEAD --list "v*.*.*" |
              Where-Object { $_ -match '^v\d+\.\d+\.\d+$' -and $_ -ne $env:RELEASE_TAG } |
              ForEach-Object {
                [pscustomobject]@{
                  Name = $_
                  Version = [version]($_ -replace '^v', '')
                }
              } |
              Sort-Object -Property @{ Expression = { $_.Version }; Descending = $true }
          )

          if ($previousTags.Count -gt 0) {
            $changeRange = "$($previousTags[0].Name)..HEAD"
            $changeTitle = "Changes since $($previousTags[0].Name):"
          } else {
            $changeRange = "HEAD"
            $changeTitle = "Changes in this build:"
          }

          $changes = @(git log --pretty=format:"- %s (%h)" $changeRange)
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          if ($changes.Count -eq 0) {
            $changes = @("- No code changes since the previous release tag.")
          }

          if ($previousTags.Count -gt 0) {
            $changedPaths = @(git diff --name-only $changeRange)
          } else {
            $changedPaths = @(git ls-tree -r --name-only HEAD)
          }
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          $luaTouchedPaths = @(
            $changedPaths |
              Where-Object {
                ($_ -match '^protocols/(protoscope_api_manifest\.json|protoscope_api\.lua|stream_types\.lua|README\.md|templates/|[^/]+/main\.lua)') -or
                ($_ -match '^docs/(user-manual|lua-host-integration)\.md$')
              } |
              Sort-Object -Unique
          )

          $luaNotes = @()
          if ($luaTouchedPaths.Count -gt 0) {
            $luaNotes = @(
              "",
              "Lua API and protocol templates:",
              "- Lua scripting or bundled examples changed; review protocols/README.md and docs/user-manual.md before publishing.",
              "- Recommended copyable sample: protocols/templates/oscilloscope_control (toolbar toggle, Lua Dock controls, history_limit, reset_history).",
              "- Editor hints are packaged in protocols/protoscope_api.lua and must match protocols/protoscope_api_manifest.json."
            )
          }

          $notesPath = "release-notes.md"
          $releaseDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-dd")
          $notesLines = @(
            "ProtoScope $env:RELEASE_TAG",
            "Release date (UTC): $releaseDate",
            "",
            $changeTitle
          ) + $changes + $luaNotes + @(
            "",
            "Assets:",
            "- $env:ASSET_BASE.exe: standalone executable",
            "- $env:ASSET_BASE.zip: executable, README, LICENSE, default config, docs and Lua protocol examples",
            "- SHA256 checksums"
          )
          Set-Content -Path $notesPath -Value $notesLines -Encoding UTF8

          gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:RELEASE_TAG release-assets/* `
              --repo $env:GITHUB_REPOSITORY `
              --clobber
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
            gh release edit $env:RELEASE_TAG `
              --repo $env:GITHUB_REPOSITORY `
              --title "ProtoScope $env:RELEASE_TAG" `
              --notes-file $notesPath
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          } else {
            gh release create $env:RELEASE_TAG release-assets/* `
              --repo $env:GITHUB_REPOSITORY `
              --title "ProtoScope $env:RELEASE_TAG" `
              --notes-file $notesPath `
              --target $env:GITHUB_SHA `
              --draft
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }
